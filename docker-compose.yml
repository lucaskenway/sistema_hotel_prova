version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hotel_postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/setup.sql:/docker-entrypoint-initdb.d/1-setup.sql
      - ./seed/seed_hotels.sql:/docker-entrypoint-initdb.d/2-seed.sql

volumes:
  pgdata:
