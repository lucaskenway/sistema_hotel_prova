services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: hotel_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestao_hotel}
      POSTGRES_USER: ${POSTGRES_USER:-hotel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_password}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - hotel_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel_user} -d ${POSTGRES_DB:-gestao_hotel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache (Redis) — terceira camada obrigatória da arquitetura ────────────────
  redis:
    image: redis:7-alpine
    container_name: hotel_redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    networks:
      - hotel_network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Servidor Node.js (privado — sem acesso direto do host) ──────────────────
  node_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_node
    restart: unless-stopped

    environment:
      NODE_ENV: production
      NODE_WEB_PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-gestao_hotel}
      POSTGRES_USER: ${POSTGRES_USER:-hotel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_password}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório — defina no .env}
      REDIS_URL: redis://redis:6379

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - hotel_network

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    # Sem "ports:" — acessível somente via Nginx dentro da rede interna

  # ── Proxy reverso Nginx (único ponto de entrada externo) ───────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: hotel_nginx
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      node_web:
        condition: service_healthy

    networks:
      - hotel_network

networks:
  hotel_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
